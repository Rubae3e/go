<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا عبر واتساب</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #075E54;
    font-family: 'Tahoma', sans-serif;
    text-align: center;
    color: white;
  }
  .box {
    padding: 30px;
  }
  .btn {
    margin-top: 20px;
    display: inline-block;
    background: #25D366;
    color: white;
    padding: 14px 28px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
  }
  svg { width: 70px; height: 70px; }
</style>
</head>
<body>
  <div class="box">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.74.46 3.44 1.32 4.93L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm0 18.13h-.01a8.2 8.2 0 0 1-4.18-1.14l-.3-.18-3.13.82.84-3.05-.2-.32a8.18 8.18 0 0 1-1.27-4.4c0-4.54 3.7-8.23 8.25-8.23 2.2 0 4.27.86 5.83 2.42a8.2 8.2 0 0 1 2.42 5.82c0 4.55-3.7 8.24-8.25 8.24z"/></svg>
    <h2>جاري تحويلك إلى واتساب...</h2>
    <p>إذا لم يتم التحويل تلقائيًا، اضغط الزر أدناه</p>
    <a class="btn" id="waLink" href="#">تواصل معنا الآن</a>
  </div>

<script>
  const phone = "9647816340884"; // الرقم بصيغة دولية بدون + أو أصفار
  const message = "مرحباً، أريد الاستفسار";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  document.getElementById('waLink').href = url;
  window.location.href = url;
</script>
</body>
</html>
